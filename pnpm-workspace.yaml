# ============================================================================
# SECURITY: Minimum release age for npm packages (supply-chain attack defense)
# ============================================================================
#
# This setting requires that any npm package version must have been published
# for at least 1 day (1440 minutes) before pnpm will allow installing it.
# This is a critical defense against supply-chain attacks. In most cases,
# malicious npm releases are discovered and pulled within hours, so a 1-day
# delay provides a strong safety buffer.
#
# DO NOT DISABLE THIS SETTING. Removing or setting it to 0 is considered
# extremely dangerous and leaves the entire workspace vulnerable to supply-
# chain attacks, which have been the #1 vector for npm ecosystem compromises.
#
# If you absolutely need to install a package before the 1-day window has
# passed (e.g. an urgent security bugfix), you can add it to the
# `minimumReleaseAgeExclude` allowlist below. Only consider doing this for
# packages released by trusted organizations with an impeccable security
# posture. Even then, remove the exclusion once the 1-day window has passed.
# ============================================================================
minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - react
  - typescript

packages:
  # ─── RESTORED FLAGSHIP APP ───
  - "apps/sierra-estates-realty"
  # ─── TWO-APP ARCHITECTURE ───
  # Vercel App: public client site + light dashboard (read-only)
  - "apps/vercel-app"
  # Firebase Admin App: admin panel + bots + scrapers + workflows (write)
  - "apps/firebase-admin"
  # ─── SUPPORTING APPS ───
  - "apps/api"              # Python FastAPI (Cloud Run)
  - "apps/agents"           # WhatsApp scraper + deal orchestration
  - "apps/mass-blast"       # WhatsApp bulk messaging
  # ─── SHARED PACKAGES (used by BOTH apps) ───
  - "packages/*"
  # ─── INFRASTRUCTURE ───
  - "functions"
  - "scripts"

catalog:
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.2.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  # Must be this exact version because expo requires it
  react: 19.1.0
  # Must be this exact version because expo requires it
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vite: ^7.3.5
  wouter: ^3.3.5
  zod: ^3.25.76

autoInstallPeers: false

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver
  - '@firebase/util'
  - '@google/genai'
  - core-js
  - protobufjs

overrides:
  # Pin esbuild to a known-good version
  esbuild: "0.28.1"
  # Security overrides for transitive dependency vulnerabilities
  qs: "^6.15.2"
  js-yaml: "^4.2.0"
  markdown-it: "^14.2.0"
  "@babel/core": "^7.29.6"
  # Force a single @types/react across the workspace — duplicate 18.x/19.x
  # copies caused framer-motion's children prop to fail type-checking.
  "@types/react": "^19"
  "@types/react-dom": "^19"

allowBuilds:
  '@firebase/util': true
  '@google/genai': true
  core-js: true
  esbuild: true
  protobufjs: true
  puppeteer: true
  openclaw: true
  tree-sitter-bash: true
  unrs-resolver: true