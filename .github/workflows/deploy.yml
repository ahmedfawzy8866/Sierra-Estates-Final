name: Deploy Sierra Estates 3.0

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────
  # JOB 1: CLIENT SITE → Vercel (sierra-estates-realty)
  # ─────────────────────────────────────────────────
  deploy-client:
    name: "Client Site to Vercel"
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Client Site
        run: pnpm --filter sierra-estates-realty build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || 'ci-placeholder' }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        if: env.VERCEL_TOKEN != ''
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/sierra-estates-realty
          vercel-args: --prod

  # ─────────────────────────────────────────────────
  # JOB 2: FIRESTORE + STORAGE RULES → Firebase
  # ─────────────────────────────────────────────────
  deploy-firestore-rules:
    name: "Firestore & Storage Rules"
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Rules
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        run: npx firebase-tools deploy --only firestore:rules,firestore:indexes,storage --non-interactive

  # ─────────────────────────────────────────────────
  # JOB 3: ADMIN PANEL → Firebase Hosting
  # Uses pre-built admin-panel/dist/ (no build needed)
  # ─────────────────────────────────────────────────
  deploy-admin:
    name: "Admin Panel to Firebase Hosting"
    runs-on: ubuntu-latest
    needs: deploy-firestore-rules
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Admin to Firebase Hosting
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        run: npx firebase-tools deploy --only hosting --non-interactive
