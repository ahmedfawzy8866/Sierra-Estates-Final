name: Retry Copilot Review

on:
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write

jobs:
  retry-copilot-review:
    if: >-
      github.event.review.user.login == 'copilot-pull-request-reviewer[bot]' &&
      contains(github.event.review.body, 'unable to review this pull request')
    runs-on: ubuntu-latest

    steps:
      - name: Re-request Copilot review once
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const failureText = 'unable to review this pull request';

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const failureReviews = reviews.filter(
              (review) =>
                review.user?.login === 'copilot-pull-request-reviewer[bot]' &&
                (review.body || '').includes(failureText)
            );

            if (failureReviews.length > 1) {
              core.info('Copilot review was already retried once. Skipping additional retries.');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ['Copilot'],
              });
              core.info('Re-requested review from Copilot.');
            } catch (error) {
              if (error.status === 422) {
                core.warning('Could not request Copilot review (possibly already requested).');
                return;
              }

              throw error;
            }
