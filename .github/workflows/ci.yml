name: CI — Sierra Estates Final

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build, Lint & Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      # pnpm must be set up BEFORE setup-node so the cache key is correct
      - name: Install dependencies
        run: npm ci

      # ── Lint (non-blocking warnings are OK, errors fail) ──────────────────
      - name: Lint
        run: npm run lint
        continue-on-error: false

      # ── Type-check (skip emit, just check types) ───────────────────────────
      - name: Type-check
        run: npm run type-check
        # Allow type-check to warn without blocking deploy
        continue-on-error: true

      # ── Build (real production build via Turbo) ────────────────────────────
      - name: Build
        run: npm run build
        env:
          # Provide dummy Firebase config so build doesn't crash on missing env
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || 'ci-placeholder' }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || 'ci-placeholder' }}

      # ── Tests (only if test:ci script exists and passes) ──────────────────
      - name: Test
        run: pnpm test:ci
        continue-on-error: true
