name: CI — Quality, Test & Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  # Public Firebase config (safe to expose; needed for Next.js build)
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'AIzaSyBZLN2jTTKV34SneGPoWRz1zoRpX5uODjs' }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'sierra-blu.firebaseapp.com' }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'sierra-blu' }}
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || 'sierra-blu.firebasestorage.app' }}
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || '941030513456' }}
  NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || '1:941030513456:web:ci-placeholder' }}
  NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://sierra-estates.vercel.app' }}
  # Server-only secrets (placeholder for CI — real values only in Vercel)
  SBR_SECRET_KEY: ci-secret-key-not-a-real-one-xxxx
  TWILIO_ACCOUNT_SID: ''
  TWILIO_AUTH_TOKEN: ''

jobs:
  quality:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check (all packages)
        run: pnpm run type-check

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for high/critical vulnerabilities
        run: pnpm audit --audit-level high || true
        continue-on-error: true

      - name: Check for hardcoded secrets in changed files
        run: |
          SECRETS_FOUND=0
          # Only check files changed in this PR/push
          for file in $(git diff --name-only HEAD~1..HEAD -- '*.ts' '*.tsx' '*.js' 2>/dev/null || find . -name '*.ts' -not -path '*/node_modules/*' -not -path '*/.next/*'); do
            if [ -f "$file" ]; then
              if grep -qE '(AIzaSy[A-Za-z0-9_\-]{30}|sk-[a-zA-Z0-9]{20,}|AKIA[A-Z0-9]{16}|-----BEGIN (RSA |EC )?PRIVATE KEY-----|ghp_[A-Za-z0-9]{30,})' "$file" 2>/dev/null; then
                echo "::warning file=$file::Possible hardcoded secret detected"
                SECRETS_FOUND=1
              fi
            fi
          done
          if [ "$SECRETS_FOUND" -eq 1 ]; then
            echo "⚠️ WARNING: Possible hardcoded secrets detected. Review the warnings above."
            echo "   If these are intentional CI placeholders, add exceptions to .github/workflows/ci.yml"
          else
            echo "✅ No hardcoded secrets detected in changed files."
          fi
