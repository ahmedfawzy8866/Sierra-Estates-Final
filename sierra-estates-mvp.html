  --pepsi: #004B93;
  --royal: #4169E1;
  --gold: #D3A747;
  --gold-lt: #E8CC88;
  --text: #F0EBE0;
  --text-mid: rgba(240, 235, 224, 0.65);
  --text-faint: rgba(240, 235, 224, 0.35);
  --border: rgba(211, 167, 71, 0.12);
  --border-strong: rgba(211, 167, 71, 0.28);
  --white: #FFFFFF;
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  --shadow-gold: 0 4px 24px rgba(211, 167, 71, 0.15);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-lg: 24px;
  --font-head: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-ar: 'Cairo', 'Inter', sans-serif;
}
[data-theme="light"] {
  --bg: #F8F6F0;
  --bg-elev: #FFFFFF;
  --bg-card: #FFFFFF;
  --bg-glass: rgba(255, 255, 255, 0.78);
  --text: #0A0F1A;
  --text-mid: rgba(10, 15, 26, 0.6);
  --text-faint: rgba(10, 15, 26, 0.35);
  --border: rgba(0, 45, 98, 0.08);
  --border-strong: rgba(0, 45, 98, 0.16);
  --shadow: 0 8px 32px rgba(0, 45, 98, 0.08);
  --shadow-gold: 0 4px 24px rgba(211, 167, 71, 0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  transition: background 0.4s ease, color 0.4s ease;
}
[dir="rtl"] body { font-family: var(--font-ar); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

/* ═══ SHIMMER TEXT ═══ */
.shimmer-text {
  background: linear-gradient(90deg, var(--gold) 0%, var(--gold-lt) 30%, #FFF 50%, var(--gold-lt) 70%, var(--gold) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmerSweep 4s linear infinite;
}
@keyframes shimmerSweep { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

/* ═══ GLASS HEADER ═══ */
.glass-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg-glass);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  transition: all 0.3s ease;
}
.glass-header.scrolled { padding: 6px 16px; box-shadow: var(--shadow); }

/* ═══ BOTTOM NAV ═══ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg-glass);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around; align-items: center;
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.bottom-nav.hidden { transform: translateY(100%); }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--text-faint);
  font-size: 10px; font-weight: 600; cursor: pointer; padding: 4px 12px;
  border-radius: 12px; transition: all 0.25s ease;
}
.nav-item.active { color: var(--gold); }
.nav-item:active { transform: scale(0.92); }
.nav-item svg { width: 22px; height: 22px; }

/* ═══ BUTTONS ═══ */
.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-lt));
  color: #060B12; border: none; padding: 12px 28px; border-radius: 30px;
  font-size: 13px; font-weight: 700; letter-spacing: 0.04em; cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 20px rgba(211, 167, 71, 0.3);
}
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(211, 167, 71, 0.45); }
.btn-gold:active { transform: scale(0.96); }

.btn-ghost {
  background: transparent; color: var(--text); border: 1px solid var(--border-strong);
  padding: 12px 28px; border-radius: 30px; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all 0.25s ease;
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

/* ═══ CARDS ═══ */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.card:hover { border-color: var(--border-strong); transform: translateY(-4px); box-shadow: var(--shadow); }

/* ═══ BOTTOM SHEET ═══ */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5);

.sheet-overlay.open { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;

  border-top: 1px solid var(--border-strong);
  max-height: 85vh; overflow-y: auto; transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  padding: 8px 20px 40px;
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 0 auto 16px; }

/* ═══ FORM INPUTS ═══ */
.input-group { margin-bottom: 16px; }
.input-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 6px; display: block; }
.input-field {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px 14px; font-size: 14px; color: var(--text); font-family: inherit; outline: none;
  transition: border-color 0.25s ease;
}
.input-field:focus { border-color: var(--gold); }
select.input-field { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%23D3A747' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 14px center; }

.toggle-group { display: flex; background: var(--bg); border-radius: 30px; padding: 4px; gap: 4px; }
.toggle-btn { flex: 1; padding: 10px; border: none; border-radius: 26px; background: transparent; color: var(--text-mid); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.25s ease; }
.toggle-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold-lt)); color: #060B12; }

/* ═══ MAP ═══ */
.map-container { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); position: relative; }
.leaflet-container { background: var(--bg-elev) !important; font-family: var(--font-body) !important; }
[data-theme="dark"] .leaflet-tile-pane { filter: invert(1) hue-rotate(200deg) brightness(0.85) contrast(1.1) saturate(0.8); }
.leaflet-control-attribution { display: none !important; }
.leaflet-control-zoom { display: none !important; }
.map-pin {

.tour-label { position: absolute; top: 12px; left: 12px; background: var(--bg-glass); backdrop-filter: blur(12px); border: 1px solid var(--border-strong); border-radius: 8px; padding: 6px 12px; font-size: 11px; font-weight: 600; color: var(--gold); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
@keyframes glowPulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
@keyframes scanLine { 0% { top: -2%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 102%; opacity: 0; } }
@keyframes orbFloat { 0%, 100% { transform: translate(0, 0); } 33% { transform: translate(30px, -20px); } 66% { transform: translate(-20px, 20px); } }

.fade-up { animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; }
.float-anim { animation: float 3s ease-in-out infinite; }
.breathe-anim { animation: breathe 4s ease-in-out infinite; }

.reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
.reveal.in { opacity: 1; transform: none; }

.desktop-nav a:hover { color: var(--gold); }
</style>

/* ═══ GLASS HEADER ═══ */
function Header({ onRequest, activeSection, scrollToSection }) {
  const { theme, toggleTheme, lang, toggleLang } = useApp();
  const [scrolled, setScrolled] = useState(false);
  const t = T[lang];

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <header className={`glass-header ${scrolled ? 'scrolled' : ''}`} dir={lang === 'ar' ? 'rtl' : 'ltr'}>
      <Logo size={scrolled ? 30 : 36} />
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <div className="desktop-nav">
          {['home', 'listings', 'map', 'tour', 'contact'].map(s => (
            <a key={s} onClick={() => scrollToSection(s)} style={{ cursor: 'pointer', color: activeSection === s ? 'var(--gold)' : 'var(--text-mid)' }}>
              {t.nav[s]}
            </a>
          ))}
        </div>
        <button onClick={toggleLang} style={{ background: 'none', border: '1px solid var(--border-strong)', borderRadius: 8, padding: '6px 10px', color: 'var(--text-mid)', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
          {lang === 'en' ? 'ع' : 'EN'}
        </button>
        <button onClick={toggleTheme} style={{ background: 'none', border: '1px solid var(--border-strong)', borderRadius: 8, padding: 6, color: 'var(--gold)', cursor: 'pointer', display: 'flex', alignItems: 'center' }}>
          <Icon name={theme === 'dark' ? 'sun' : 'moon'} size={16} />
        </button>
        <button className="btn-gold" onClick={onRequest} style={{ padding: '8px 18px', fontSize: 12 }}>
          {t.requestNow}
        </button>
      </div>
    </header>
  );
}

          <button className="btn-ghost" onClick={() => scrollToSection('map')}>{t.nav.map}</button>

/* ═══ REQUEST MODAL (Smart Filter) ═══ */
function RequestModal({ open, onClose }) {
  const { lang } = useApp();
  const t = T[lang];
  const [purpose, setPurpose] = useState('buy');
  const [bedrooms, setBedrooms] = useState('any');
  const [selectedCompounds, setSelectedCompounds] = useState([]);
  const [budget, setBudget] = useState('');
  const [name, setName] = useState('');
  const [whatsapp, setWhatsapp] = useState('');
  const [submitted, setSubmitted] = useState(false);

  const toggleCompound = (c) => {
    setSelectedCompounds(prev => prev.includes(c) ? prev.filter(x => x !== c) : [...prev, c]);
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    setSubmitted(true);
    setTimeout(() => { setSubmitted(false); onClose(); }, 2000);
  };

  return (
    <>
      <div className={`sheet-overlay ${open ? 'open' : ''}`} onClick={onClose} />
      <div className={`sheet ${open ? 'open' : ''}`} dir={lang === 'ar' ? 'rtl' : 'ltr'}>
        <div className="sheet-handle" onClick={onClose} />
        <h2 style={{ fontFamily: 'var(--font-head)', fontSize: 24, fontWeight: 700, marginBottom: 4 }}>{t.dreamHome}</h2>
        <p style={{ fontSize: 13, color: 'var(--text-mid)', marginBottom: 20 }}>{t.dreamDesc}</p>

        {submitted ? (
          <div style={{ textAlign: 'center', padding: 40 }}>
            <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'var(--gold)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
              <Icon name="check" size={32} />
            </div>
            <p style={{ fontSize: 16, fontWeight: 700, color: 'var(--gold)' }}>{lang === 'en' ? 'Request Submitted!' : 'تم إرسال الطلب!'}</p>
          </div>
        ) : (
          <form onSubmit={handleSubmit}>
            <div className="input-group">
              <label className="input-label">{t.filter.buy} / {t.filter.rent}</label>
              <div className="toggle-group">
                <button type="button" className={`toggle-btn ${purpose === 'buy' ? 'active' : ''}`} onClick={() => setPurpose('buy')}>{t.filter.buy}</button>
                <button type="button" className={`toggle-btn ${purpose === 'rent' ? 'active' : ''}`} onClick={() => setPurpose('rent')}>{t.filter.rent}</button>
              </div>
            </div>

            <div className="input-group">
              <label className="input-label">{t.filter.compound}</label>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, maxHeight: 120, overflowY: 'auto', padding: 4 }}>
                {COMPOUNDS.map(c => (
                  <button key={c.name} type="button" className={`chip ${selectedCompounds.includes(c.name) ? 'active' : ''}`} onClick={() => toggleCompound(c.name)}>
                    {lang === 'ar' ? c.nameAr : c.name}
                  </button>
                ))}
              </div>
            </div>

            <div className="input-group">
              <label className="input-label">{t.filter.bedrooms}</label>
              <select className="input-field" value={bedrooms} onChange={e => setBedrooms(e.target.value)}>
                <option value="any">{t.filter.any}</option>
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5+</option>
              </select>
            </div>

            <div className="input-group">
              <label className="input-label">{t.filter.budget}</label>
              <input className="input-field" type="text" value={budget} onChange={e => setBudget(e.target.value)} placeholder="EGP 5,000,000" />
            </div>

            <div className="input-group">
              <label className="input-label">{t.filter.name}</label>
              <input className="input-field" type="text" value={name} onChange={e => setName(e.target.value)} required placeholder={lang === 'en' ? 'Ahmed Hassan' : 'أحمد حسن'} />
            </div>

            <div className="input-group">
              <label className="input-label">{t.filter.whatsapp}</label>
              <input className="input-field" type="tel" value={whatsapp} onChange={e => setWhatsapp(e.target.value)} required placeholder="+20 100 123 4567" />
            </div>

            <button type="submit" className="btn-gold" style={{ width: '100%', marginTop: 8, padding: '14px' }}>{t.filter.submit}</button>
          </form>
        )}
      </div>
    </>
  );
}

/* ═══ LISTINGS ═══ */
function Listings({ onOpenRequest }) {
  const { lang } = useApp();
  const t = T[lang];

/* ═══ MAP SECTION ═══ */
function MapSection() {
  const { lang } = useApp();
  const t = T[lang];
  const mapRef = useRef(null);
  const mapInstance = useRef(null);
  const [selectedCompound, setSelectedCompound] = useState(null);

  useEffect(() => {
    if (!mapRef.current || mapInstance.current) return;
    const map = L.map(mapRef.current, {
      zoomControl: false, scrollWheelZoom: false, doubleClickZoom: false,
      dragging: true, touchZoom: true, boxZoom: false, keyboard: false,
    }).setView([30.03, 31.5], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19, attribution: ''
    }).addTo(map);
    mapInstance.current = map;

    COMPOUNDS.forEach(c => {
      const icon = L.divIcon({
        className: '', html: `<div class="map-pin"><div class="map-pin-count">${c.units}</div><div class="map-pin-dot"></div></div>`,
        iconSize: [0, 0], iconAnchor: [0, 40]
      });
      L.marker([c.lat, c.lng], { icon }).addTo(map).on('click', () => setSelectedCompound(c));
    });

    return () => { map.remove(); mapInstance.current = null; };
  }, []);

  const zoomIn = () => mapInstance.current?.zoomIn();
  const zoomOut = () => mapInstance.current?.zoomOut();

  return (
    <section id="map" className="section-pad reveal" style={{ padding: '60px 20px' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ marginBottom: 16 }}>
          <h2 style={{ fontFamily: 'var(--font-head)', fontSize: 28, fontWeight: 700, marginBottom: 4 }}>{t.mapTitle}</h2>
          <p style={{ fontSize: 13, color: 'var(--text-mid)', lineHeight: 1.6, maxWidth: 700 }}>{t.mapSub}</p>
        </div>
        <div className="map-container" style={{ height: 420 }}>
          <div ref={mapRef} style={{ width: '100%', height: '100%' }} />
          <div className="map-zoom-controls">
            <button className="map-zoom-btn" onClick={zoomIn}><Icon name="plus" size={18} /></button>
            <button className="map-zoom-btn" onClick={zoomOut}><Icon name="minus" size={18} /></button>
          </div>
        </div>
      </div>

      {/* Compound Bottom Sheet */}
      <div className={`sheet-overlay ${selectedCompound ? 'open' : ''}`} onClick={() => setSelectedCompound(null)} />
      <div className={`sheet ${selectedCompound ? 'open' : ''}`} dir={lang === 'ar' ? 'rtl' : 'ltr'}>
        <div className="sheet-handle" onClick={() => setSelectedCompound(null)} />
        {selectedCompound && (
          <>
            <h3 style={{ fontFamily: 'var(--font-head)', fontSize: 22, fontWeight: 700, marginBottom: 4 }}>
              {lang === 'ar' ? selectedCompound.nameAr : selectedCompound.name}
            </h3>
            <p style={{ fontSize: 13, color: 'var(--gold)', fontWeight: 700, marginBottom: 16 }}>
              {selectedCompound.units} {lang === 'en' ? 'Available Units' : 'وحدة متاحة'}
            </p>
            {Array.from({ length: Math.min(5, selectedCompound.units) }).map((_, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 0', borderBottom: '1px solid var(--border)' }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{lang === 'ar' ? `وحدة ${i + 1}` : `Unit ${i + 1}`}</div>
                  <div style={{ fontSize: 11, color: 'var(--text-mid)' }}>{['3 Beds · 220m²', '4 Beds · 350m²', '5 Beds · 500m²', '2 Beds · 120m²', '6 Beds · 800m²'][i]}</div>

/* ═══ MAIN APP ═══ */
function App() {
  const [theme, setTheme] = useState('dark');
  const [lang, setLang] = useState('en');
  const [modalOpen, setModalOpen] = useState(false);
  const [activeSection, setActiveSection] = useState('home');
  const [navVisible, setNavVisible] = useState(true);

  const toggleTheme = useCallback(() => setTheme(t => t === 'dark' ? 'light' : 'dark'), []);
  const toggleLang = useCallback(() => setLang(l => l === 'en' ? 'ar' : 'en'), []);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
    document.documentElement.setAttribute('lang', lang);
  }, [theme, lang]);

  // Scroll reveal observer
  useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, [lang]);

  // Scroll spy for active section
  useEffect(() => {
    const sections = ['home', 'listings', 'map', 'tour', 'contact'];
    const onScroll = () => {
      const scrollY = window.scrollY + 100;
      setNavVisible(window.scrollY < 100 || window.scrollY + window.innerHeight < document.body.scrollHeight - 100);
      for (let i = sections.length - 1; i >= 0; i--) {
        const el = document.getElementById(sections[i]);
        if (el && el.offsetTop <= scrollY) { setActiveSection(sections[i]); break; }
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const scrollToSection = (section) => {
    const el = document.getElementById(section);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  const isAdmin = typeof window !== 'undefined' && window.location.hostname.includes('admin');

  return (
    <AppCtx.Provider value={{ theme, lang, toggleTheme, toggleLang }}>
      {isAdmin ? (
        <>
          <Header onRequest={() => {}} activeSection="" scrollToSection={() => {}} />
          <AdminPanel />
        </>
      ) : (
        <>
          <Header onRequest={() => setModalOpen(true)} activeSection={activeSection} scrollToSection={scrollToSection} />
          <main style={{ paddingBottom: 60 }}>
            <Hero onRequest={() => setModalOpen(true)} scrollToSection={scrollToSection} />
            <div className="gold-divider" />
            <Listings onOpenRequest={() => setModalOpen(true)} />
            <div className="gold-divider" />
            <IntelligenceOS />
            <div className="gold-divider" />
            <MapSection />
            <div className="gold-divider" />
            <VirtualTour />
            <div className="gold-divider" />
            <WhySierra />
          </main>
          <BottomNav active={activeSection} onSelect={scrollToSection} visible={navVisible} />
          <RequestModal open={modalOpen} onClose={() => setModalOpen(false)} />
        </>
      )}
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
